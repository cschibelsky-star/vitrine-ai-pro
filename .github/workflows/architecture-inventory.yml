name: Architecture Inventory

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  inventory:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, sqlite3
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          cp .env.example .env
          mkdir -p database storage/app/audits
          touch database/database.sqlite
          php artisan key:generate

      - name: Generate inventory
        run: php artisan architecture:inventory --json > architecture-inventory-output.json

      - name: Validate PHP syntax
        run: find app -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Upload inventory artifact
        uses: actions/upload-artifact@v4
        with:
          name: architecture-inventory
          path: |
            storage/app/audits/architecture-inventory.json
            architecture-inventory-output.json
          if-no-files-found: error
