name: PHP Syntax

on:
  pull_request:
    paths:
      - 'app/**/*.php'
      - 'bootstrap/**/*.php'
      - 'config/**/*.php'
      - 'database/**/*.php'
      - 'routes/**/*.php'
      - '.github/workflows/php-syntax.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Validate PHP syntax
        run: find app bootstrap config database routes -type f -name '*.php' -print0 | xargs -0 -n1 php -l
